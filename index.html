<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FULL RESET</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #b1e0a4;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.header {
    width: 100%;
    text-align: left;
    margin-bottom: 20px;
    margin-left: 95px;
}
.container {
    text-align: left;
    width: 90%;
    max-width: 1840px;
    padding: 25px;
    border-radius: 30px;
    position: relative;
    background: white;
    z-index: 1;
}

.container::before {
    content: "";
    position: absolute;
    inset: -5px;
    border-radius: 35px;
    background: linear-gradient(
        135deg,
        #ff66cc,
        #66ccff
    );
    z-index: -1;
    box-shadow:
        0 0 20px #ff66cc,
        0 0 30px #66ccff;
}

.profile-pic {
    display: block;
    width: 150px;
    height: 150px;
    margin: 0 20 20px 0;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid white;
    box-shadow:
        0 0 10px #ff66cc,
        0 0 20px #66ccff;
}

h1 {
    margin-bottom: 25px;
}

.link {
    display: flex;
    justify-content: center;   /* centers text inside box */
    align-items: center;
    gap: 10px;

    background: white;
    color: black;
    text-decoration: none;

    padding: 15px;
    margin: 12px 0;

    border-radius: 12px;
    font-weight: bold;

    width: 300px;   /* keeps them as a left column */
}


.links-video {
    align-self: center;
    display: flex;
    gap: 40px;
    align-items: center;
    justify-content: center;
}

.links {
    flex: 1;
}

.side-video {
    display: block;
    width: 700px;
    border-radius: 15px;
    transform: translateX(-400px);
    transform: translateY(-250px);
}

.link:hover {
    background: #f2f2f2;
    transform: scale(1.03);
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <img src="spitavious.jpg" alt="Profile Picture" class="profile-pic">
        <h1>Spitavious</h1>
    </div>
    
<div class="links-video">

    <div class="links">
        <a class="link" href="https://instagram.com/Spitavious" target="_blank">
            Instagram
        </a>

        <a class="link" href="https://youtube.com/@Spitavious" target="_blank">
            YouTube
        </a>

        <a class="link" href="https://tiktok.com/@Spitavious" target="_blank">
            TikTok
        </a>

        <a class="link" href="https://x.com/Spitavious" target="_blank">
            X / Twitter
        </a>

        <a class="link" href="https://www.twitch.tv/spitavious" target="_blank">
            Twitch
        </a>
    </div>

    <video class="side-video" controls autoplay loop>
        <source src="SpitVideo.mp4" type="video/mp4">
    </video>

    </div> <!-- links-video -->

</div> <!-- container -->

</body>
</html>
