<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FULL RESET</title>
<link rel="icon" type="image/png" href="fullreset.png">
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #b1e0a4;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}
.mobile-only-message {
    display: none;
    text-align: center;
    font-size: 18px;
    margin-top: 20vh;
    color: #333;
}

@media (max-width: 768px) {
    body {
        display: none; /* Hide all content on mobile */
    }
    .mobile-only-message {
        display: block; /* Show message on mobile */
    }
}
.header {
    width: 100%;
    text-align: left;
    margin-bottom: 20px;
    margin-left: 95px;
}
.container {
    text-align: left;
    width: 90%;
    max-width: 1840px;
    padding: 25px;
    border-radius: 30px;
    position: relative;
    background: white;
    z-index: 1;
}

.container::before {
    content: "";
    position: absolute;
    inset: -5px;
    border-radius: 35px;
    background: linear-gradient(
        135deg,
        #ff66cc,
        #66ccff
    );
    z-index: -1;
    box-shadow:
        0 0 20px #ff66cc,
        0 0 30px #66ccff;
}

.profile-pic {
    display: block;
    width: 150px;
    height: 150px;
    margin: 0 20px 15px 0;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid white;
    box-shadow:
        0 0 10px #ff66cc,
        0 0 20px #66ccff;
}

h1 {
    margin-bottom: 25px;
}
    
.subtext {
max-width: 200px;   /* Limit width */
    width: 80%;          /* Responsive width */
    text-align: center;
    font-size: 15px;    /* Adjust size if needed */
    padding: 10px;          /* Space inside */
    line-height: 1.5;   /* Improve spacing */
    margin-left: -30px;
}

.link {
    display: flex;
    justify-content: center;   /* centers text inside box */
    align-items: center;
    gap: 10px;

    background: white;
    color: black;
    text-decoration: none;

    padding: 15px;
    margin: 12px 0;

    border-radius: 12px;
    font-weight: bold;

    width: 300px;   /* keeps them as a left column */
    opacity: 0;
    animation: fadeInUp 0.5s ease-out forwards;
}

.link:nth-child(1) { animation-delay: 0.2s; }
.link:nth-child(2) { animation-delay: 0.4s; }
.link:nth-child(3) { animation-delay: 0.6s; }
.link:nth-child(4) { animation-delay: 0.8s; }
.link:nth-child(5) { animation-delay: 1s; }

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(15px);
    }

    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.links-video {
    align-self: center;
    display: flex;
    gap: 40px;
    align-items: center;
    justify-content: center;
}

.links {
    flex: 1;
}
.middle-gif {
    width: 500px;
    height: auto;
    align-self: center;
    transform: translateX(-50px, -50px);
}

.side-video {
    display: block;
    width: 800px;
    border-radius: 15px;
    transform: translate(-50px, -160px);
}

.link:hover {
    background: #f2f2f2;
    transform: scale(1.03);
}
        .mobile-message {
        display: none
    }

    @media (max-width: 600px) {
        .video-container {
            display: none;
        }
        .mobile-message {
            display: block;
            text-align: center
        }
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <img src="spitavious.jpg" alt="Profile Picture" class="profile-pic">
        <h1>Spitavious</h1>
<p class="subtext">Check out my very cool links.. show a brother some love, gimme a kiss... I mean click.</p>
    </div>
    
<div class="links-video">

    <div class="links">
<a class="link" href="https://instagram.com/Spitavious" target="_blank">
    <i class="fa-brands fa-instagram"></i> Instagram
</a>

<a class="link" href="https://youtube.com/@Spitavious" target="_blank">
    <i class="fa-brands fa-youtube"></i> YouTube
</a>

<a class="link" href="https://tiktok.com/@Spitavious" target="_blank">
    <i class="fa-brands fa-tiktok"></i> TikTok
</a>

<a class="link" href="https://x.com/Spitavious" target="_blank">
    <i class="fa-brands fa-x-twitter"></i> X / Twitter
</a>

<a class="link" href="https://www.twitch.tv/spitavious" target="_blank">
    <i class="fa-brands fa-twitch"></i> Twitch
</a>
    </div>
    
<img src="spitavious_char_large.gif" alt="Spitavious GIF" class="middle-gif">
    
<video class="side-video" controls muted autoplay>
    <source src="Tobi (1).mp4" type="video/mp4">
</video>

    </div> <!-- links-video -->

</div> <!-- container -->
<div class="mobile-only-message">
    For the best experience, please visit this site on a desktop screen.
</div>
</body>
</html>
