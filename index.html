<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FULL RESET</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #b1e0a4;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    text-align: left;
    width: 90%;
    max-width: 1840px;
    padding: 25px;
    border-radius: 30px;
    position: relative;
    background: white;
    z-index: 1;
}

.container::before {
    content: "";
    position: absolute;
    inset: -5px;
    border-radius: 35px;
    background: linear-gradient(
        135deg,
        #ff66cc,
        #66ccff
    );
    z-index: -1;
    box-shadow:
        0 0 20px #ff66cc,
        0 0 30px #66ccff;
}

.profile-pic {
    display: block;
    width: 150px;
    height: 150px;
    margin: 0 0 20px 0;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid white;
    box-shadow:
        0 0 10px #ff66cc,
        0 0 20px #66ccff;
}

h1 {
    margin-bottom: 25px;
}

.link {
    display: block;
    background: white;
    color: black;
    text-decoration: none;
    padding: 15px;
    margin: 12px 0;
    border-radius: 12px;
    font-weight: bold;
    transition: transform 0.2s, background 0.2s;
}

.link:hover {
    background: #f2f2f2;
    transform: scale(1.03);
}
</style>
</head>

<body>


<div class="container">
    <img src="spitavious.jpg" alt="Profile Picture" class="profile-pic">

    <h1>Spitavious</h1>

<a class="link" href="https://instagram.com/Spitavious" target="_blank">
    <i class="fa-brands fa-instagram"></i> Instagram
</a>

<a class="link" href="https://youtube.com/@Spitavious" target="_blank">
    <i class="fa-brands fa-youtube"></i> YouTube
</a>

<a class="link" href="https://tiktok.com/@Spitavious" target="_blank">
    <i class="fa-brands fa-tiktok"></i> TikTok
</a>

<a class="link" href="https://x.com/Spitavious" target="_blank">
    <i class="fa-brands fa-x-twitter"></i> X / Twitter
</a>

<a class="link" href="https://www.twitch.tv/spitavious" target="_blank">
    <i class="fa-brands fa-twitch"></i> Twitch
</a>
</div>

</body>
</html>
